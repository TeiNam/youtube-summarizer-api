services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: youtube-summary-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # 시놀로지 리버스 프록시 경로 설정 시 아래 주석 해제
      # API_PREFIX: /yts/api
      # ROOT_PATH: /yts/api
      TZ: Asia/Seoul
    restart: unless-stopped
    # 헬스체크는 Dockerfile의 HEALTHCHECK를 사용한다.
    # (API_PREFIX를 반영해 {prefix}/health를 호출 — 여기서 재정의하면 prefix 설정 시 404)
